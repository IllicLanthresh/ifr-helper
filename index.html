<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0e14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="format-detection" content="telephone=no" />
  <title>IFR Radio Companion</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <header class="app-header" id="appHeader">
    <div class="app-header__brand">
      <span class="app-header__title">IFR RADIO COMPANION</span>
    </div>
    <div class="app-header__data" id="headerData">
      <div class="hdata"><span class="hdata__label">CS</span><span class="hdata__value" data-hdr="callsign">—</span></div>
      <div class="hdata"><span class="hdata__label">ROUTE</span><span class="hdata__value" data-hdr="route">— → —</span></div>
      <div class="hdata"><span class="hdata__label">ATIS</span><span class="hdata__value" data-hdr="atis">—</span></div>
      <div class="hdata"><span class="hdata__label">QNH</span><span class="hdata__value" data-hdr="qnh">—</span></div>
      <div class="hdata"><span class="hdata__label">PAX</span><span class="hdata__value" data-hdr="pax">—</span></div>
    </div>
    <div class="app-header__controls">
      <div class="phraseology-toggle" role="group" aria-label="Phraseology style">
        <button type="button" class="phraseology-toggle__btn is-active" data-phraseology="icao">ICAO</button>
        <button type="button" class="phraseology-toggle__btn" data-phraseology="faa">FAA</button>
      </div>
    </div>
  </header>

  <nav class="tab-nav" id="tabNav" aria-label="Flight phases"></nav>

  <main class="phase-container" id="phaseContainer">
    <!-- Phase body injected by render.js -->
  </main>

  <footer class="footer-nav">
    <button type="button" class="footer-nav__btn footer-nav__btn--back" id="btnBack">
      <span aria-hidden="true">◀</span> Back
    </button>
    <div class="footer-nav__phase" id="footerPhaseLabel">—</div>
    <button type="button" class="footer-nav__btn footer-nav__btn--next" id="btnNext">
      Next <span aria-hidden="true">▶</span>
    </button>
  </footer>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
